<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepWin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#00c853;
padding:20px;
color:white;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,.2);
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
color:#00c853;
}

.progress{
background:white;
padding:25px;
margin-top:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.bar{
height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:67%;
background:#00c853;
}

@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
margin-left:0;
}

}
</style>

</head>
<body>

<div class="sidebar">
<h2>STEPWIN</h2>

<a href="index.html">Home</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="profile.html">Profile</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<div class="topbar">
<h2>Welcome Back 👋</h2>
<p>Your fitness journey is on track.</p>
</div>

<div class="cards">

<div class="card">
<h3>Today's Steps</h3>
<p>8,450</p>
</div>

<div class="card">
<h3>Current Rank</h3>
<p>#12</p>
</div>

<div class="card">
<h3>Reward Pool</h3>
<p>₹50,000</p>
</div>

<div class="card">
<h3>Total Users</h3>
<p>12,000</p>
</div>

</div>

<div class="progress">
<h3>Challenge Progress</h3>
<div class="bar">
<div class="fill"></div>
</div>
<p style="margin-top:10px;">67% Completed</p>
</div>

</div>

</body>
</html>
